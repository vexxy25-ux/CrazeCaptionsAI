<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Craze Captions AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  body {
    font-family: Inter, Arial, sans-serif;
    background: linear-gradient(135deg,#0f0f14,#1a1a25);
    color: white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
  }

  .container {
    background:#181824;
    padding:32px;
    border-radius:18px;
    width:460px;
    box-shadow:0 25px 60px rgba(0,0,0,.55);
    text-align:center;
  }

  h1 {
    margin:0 0 6px 0;
    font-size:26px;
  }

  .sub {
    opacity:.7;
    font-size:14px;
    margin-bottom:18px;
  }

  select {
    width:100%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin-bottom:12px;
    font-size:14px;
    background:#101018;
    color:white;
  }

  button {
    width:100%;
    padding:14px;
    margin-top:10px;
    border:none;
    border-radius:12px;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.18s ease;
  }

  button:hover {
    transform:translateY(-2px);
  }

  .gen-btn {
    background:linear-gradient(135deg,#ff2e88,#ff6b6b);
    color:white;
  }

  .copy-btn {
    background:#2a2a3a;
    color:white;
  }

  .pro-btn {
    background:linear-gradient(135deg,#7c5cff,#b794ff);
    color:white;
  }

  #output {
    background:#0e0e16;
    border-radius:12px;
    padding:18px;
    margin-top:18px;
    min-height:130px;
    white-space:pre-wrap;
    text-align:left;
    font-size:14px;
    line-height:1.5;
  }

  .badge {
    margin-top:10px;
    font-size:12px;
    opacity:.65;
  }
</style>
</head>

<body>

<div class="container">
  <h1>Craze Captions AI</h1>
  <div class="sub">Pick your niche → generate → go viral</div>

  <select id="category">
    <option value="auto">🔥 Auto (Best)</option>
    <option value="booktok">📚 BookTok</option>
    <option value="horror">👻 HorrorTok</option>
    <option value="ai">🤖 AI & Side Hustle</option>
    <option value="glowup">✨ Glow Up</option>
    <option value="creator">📈 Creator Growth</option>
  </select>

  <button class="gen-btn" onclick="generateBio()">Generate Viral Caption</button>
  <button class="copy-btn" onclick="copyBio()">Copy Caption</button>
  <button class="pro-btn" onclick="unlockPro()">⭐ Upgrade to Pro — $5/mo</button>

  <div id="output">Click generate to begin…</div>
  <div class="badge">⚡ 5 free uses every 24 hours</div>
</div>

<script>
/* ================= STORAGE ================= */

function getStorage(){
  return JSON.parse(localStorage.getItem("viralGen")) || {
    uses:0,
    resetTime:0,
    pro:false
  };
}

function setStorage(data){
  localStorage.setItem("viralGen", JSON.stringify(data));
}

/* ================= CATEGORY DATA ================= */

const dataMap = {
  auto: {
    subjects: [
      "dark romance",
      "AI side hustles",
      "creator growth hacks",
      "psychological horror",
      "glow up routines",
      "faceless TikTok"
    ]
  },

  booktok: {
    subjects: [
      "dark romance",
      "enemies to lovers",
      "morally grey men",
      "booktok drama",
      "spicy booktok reads"
    ]
  },

  horror: {
    subjects: [
      "psychological horror",
      "disturbing stories",
      "analog horror",
      "creepy storytime",
      "unsettling fiction"
    ]
  },

  ai: {
    subjects: [
      "AI side hustles",
      "passive income with AI",
      "faceless TikTok automation",
      "AI money methods",
      "digital product sales"
    ]
  },

  glowup: {
    subjects: [
      "glow up routines",
      "that girl productivity",
      "self improvement arc",
      "morning routine reset",
      "confidence glow up"
    ]
  },

  creator: {
    subjects: [
      "TikTok growth secrets",
      "content creator tips",
      "algorithm hacks",
      "viral posting strategy",
      "creator monetization"
    ]
  }
};

/* ================= DAILY TREND TAGS ================= */

const dailyTrends = {
  booktok: ["#booktok","#bookrecommendations","#bookworm","#spicybooktok","#romancebooks","#bookish","#readingcommunity","#enemiestolovers","#currentlyreading","#bookaddict"],
  horror: ["#horrortok","#scarytok","#creepystory","#psychologicalhorror","#analoghorror","#disturbingstories","#thrillerbooks","#spooky","#storytime","#fyp"],
  ai: ["#aitools","#aicontent","#passiveincome","#sidehustle","#makemoneyonline","#digitalproducts","#facelesstiktok","#aiautomation","#workfromhome","#fyp"],
  glowup: ["#glowup","#selfimprovement","#thatgirl","#productivitytips","#confidenceboost","#morningroutine","#levelup","#motivation","#transformation","#foryou"],
  creator: ["#creator","#contentcreator","#tiktokgrowth","#growontiktok","#viralstrategy","#algorithmhack","#tiktoktips","#socialmediamarketing","#creatorlife","#fyp"],
  auto: ["#viral","#fyp","#foryou","#contentcreator","#tiktoktips","#growontiktok","#viralvideo","#trending","#digitalproducts","#creatorlife"]
};

/* ================= HELPERS ================= */

function shuffleArray(array){
  return array.sort(()=>Math.random()-0.5);
}

function getTrendingTags(category){
  const tags = dailyTrends[category] || dailyTrends.auto;
  return shuffleArray([...tags]).slice(0,8).join(" ");
}

/* ================= MAIN ================= */

function generateBio(){
  const data = getStorage();
  const now = Date.now();

  if(!data.pro){
    if(now > data.resetTime){
      data.uses = 0;
      data.resetTime = now + (24*60*60*1000);
    }

    if(data.uses >= 5){
      document.getElementById("output").innerText =
        "⏳ Free limit reached.\n\n🔥 Upgrade to Pro for unlimited viral captions.";
      return;
    }

    data.uses++;
    setStorage(data);
  }

  const category = document.getElementById("category").value;
  const pool = dataMap[category] || dataMap.auto;

  const titles = [
    "POV: the algorithm found you 👀",
    "this is quietly going viral",
    "creators are gatekeeping this",
    "you weren’t supposed to see this",
    "this changed my content forever",
    "TikTok creators NEED this"
  ];

  const title = titles[Math.floor(Math.random()*titles.length)];
  const subject = pool.subjects[Math.floor(Math.random()*pool.subjects.length)];
  const bio = `POV: you discovered ${subject} and now your content hits different`;
  const tagSample = getTrendingTags(category);

  document.getElementById("output").innerText =
    `${title}\n\n${bio}\n\n${tagSample}`;
}

/* ================= BUTTONS ================= */

function copyBio(){
  const text = document.getElementById("output").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

function unlockPro(){
  window.open("PASTE_YOUR_STRIPE_PAYMENT_LINK_HERE","_blank");
}
</script>

</body>
</html>
